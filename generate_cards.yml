name: Generate Anki Cards

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ffmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate Anki cards
        id: generate
        env:
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          NOTION_TOKEN:       ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: |
          python anki_generator_notion.py
          if ls output/*.apkg 1>/dev/null 2>&1; then
            echo "apkg_exists=true" >> $GITHUB_OUTPUT
          else
            echo "apkg_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload .apkg as artifact
        if: steps.generate.outputs.apkg_exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: anki-cards-${{ github.run_number }}
          path: output/*.apkg
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload to GitHub Releases and notify
        if: steps.generate.outputs.apkg_exists == 'true'
        env:
          GH_TOKEN:   ${{ secrets.GH_TOKEN }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          REPO:       ${{ github.repository }}
        run: |
          TAG="anki-latest"
          FIXED_NAME="anki_cards.apkg"

          # ファイル名を固定名にコピー
          cp $(ls output/*.apkg | head -1) "output/${FIXED_NAME}"

          # 既存リリースを削除
          gh release delete "$TAG" --yes 2>/dev/null || true
          sleep 3

          # 固定名でリリース作成
          gh release create "$TAG" "output/${FIXED_NAME}" \
            --title "Latest Anki Cards" \
            --notes "Auto-generated" \
            --repo "$REPO"

          # 固定ダウンロードURL
          DOWNLOAD_URL="https://github.com/${REPO}/releases/download/${TAG}/${FIXED_NAME}"
          echo "Download URL: $DOWNLOAD_URL"

          # ntfy で通知
          curl -s \
            -H "Title: Anki cards ready" \
            -H "Tags: white_check_mark" \
            -d "$DOWNLOAD_URL" \
            "https://ntfy.sh/${NTFY_TOPIC}"
