name: Generate Anki Cards

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ffmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate Anki cards
        id: generate
        env:
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          NOTION_TOKEN:       ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: |
          python anki_generator_notion.py
          if ls output/*.apkg 1>/dev/null 2>&1; then
            echo "apkg_exists=true" >> $GITHUB_OUTPUT
            echo "apkg_path=$(ls output/*.apkg | head -1)" >> $GITHUB_OUTPUT
          else
            echo "apkg_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload .apkg as artifact
        if: steps.generate.outputs.apkg_exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: anki-cards-${{ github.run_number }}
          path: output/*.apkg
          if-no-files-found: ignore
          retention-days: 30

      - name: Send .apkg to Android via ntfy
        if: steps.generate.outputs.apkg_exists == 'true'
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          APKG_FILE=$(ls output/*.apkg | head -1)

          # .apkg を添付してntfyに送信・添付URLを取得
          RESPONSE=$(curl -s \
            -T "$APKG_FILE" \
            -H "Title: Anki upload" \
            -H "Filename: anki_cards.apkg" \
            -H "Content-Type: application/octet-stream" \
            "https://ntfy.sh/${NTFY_TOPIC}")

          echo "ntfy response: $RESPONSE"

          ATT_URL=$(echo "$RESPONSE" | python3 -c \
            "import sys,json; d=json.load(sys.stdin); print(d.get('attachment',{}).get('url',''))" \
            2>/dev/null)

          if [ -n "$ATT_URL" ]; then
            echo "Attachment URL: $ATT_URL"
            # 添付URLを本文にした通知を送信（MacroDroidがこのURLを開く）
            curl -s \
              -H "Title: Anki cards ready" \
              -H "Tags: white_check_mark" \
              -d "$ATT_URL" \
              "https://ntfy.sh/${NTFY_TOPIC}"
          else
            echo "Warning: attachment URL not found"
            # フォールバック：GitHub ActionsページのURLを通知
            curl -s \
              -H "Title: Anki cards ready" \
              -H "Tags: white_check_mark" \
              -d "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              "https://ntfy.sh/${NTFY_TOPIC}"
          fi
