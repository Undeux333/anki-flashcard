name: Generate Anki Cards

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ffmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate Anki cards
        id: generate
        env:
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          NOTION_TOKEN:       ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: |
          python anki_generator_notion.py
          # .apkg が生成されたか確認
          if ls output/*.apkg 1>/dev/null 2>&1; then
            echo "apkg_exists=true" >> $GITHUB_OUTPUT
            echo "apkg_path=$(ls output/*.apkg | head -1)" >> $GITHUB_OUTPUT
          else
            echo "apkg_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload .apkg as artifact
        if: steps.generate.outputs.apkg_exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: anki-cards-${{ github.run_number }}
          path: output/*.apkg
          if-no-files-found: ignore
          retention-days: 30

      - name: Notify Android via ntfy
        if: steps.generate.outputs.apkg_exists == 'true'
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          RUN_NUMBER: ${{ github.run_number }}
          REPO:       ${{ github.repository }}
        run: |
          ARTIFACT_URL="https://github.com/${REPO}/actions/runs/${{ github.run_id }}"
          curl -s \
            -H "Title: Anki cards ready" \
            -H "Priority: default" \
            -H "Tags: white_check_mark" \
            -H "Click: ${ARTIFACT_URL}" \
            -d "New Anki cards have been generated. Tap to open the download page.(Run #${RUN_NUMBER})" \
            "https://ntfy.sh/${NTFY_TOPIC}"
