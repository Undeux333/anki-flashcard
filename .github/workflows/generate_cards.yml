name: Generate Anki Cards

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write # リリース作成に必要

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: |
          pip install requests google-genai edge-tts genanki pydub

      - name: Generate Anki cards
        id: generate
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: |
          mkdir -p output
          python anki_generator_notion.py
          # ファイルが生成されたかチェック
          if ls output/*.apkg 1>/dev/null 2>&1; then
            echo "apkg_exists=true" >> $GITHUB_OUTPUT
          else
            echo "apkg_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload to GitHub Releases and notify
        if: steps.generate.outputs.apkg_exists == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }} # secrets.GH_TOKENが未設定ならこれを使用
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          REPO: ${{ github.repository }}
        run: |
          TAG="anki-latest"
          FIXED_NAME="anki_cards.apkg"

          # 生成された最新のファイルを取得して固定名にコピー
          LATEST_FILE=$(ls output/*.apkg | head -1)
          cp "$LATEST_FILE" "output/${FIXED_NAME}"

          # 既存リリースの削除
          gh release delete "$TAG" --yes 2>/dev/null || true
          git tag -d "$TAG" 2>/dev/null || true
          git push origin :refs/tags/"$TAG" 2>/dev/null || true
          sleep 5

          # 新規リリース作成
          gh release create "$TAG" "output/${FIXED_NAME}" \
            --title "Latest Anki Cards" \
            --notes "Generated at $(date +'%Y-%m-%d %H:%M:%S')" \
            --repo "$REPO"

          # 固定ダウンロードURL
          DOWNLOAD_URL="https://github.com/${REPO}/releases/download/${TAG}/${FIXED_NAME}"
          
          # ntfy で通知
          curl -s \
            -H "Title: Anki cards ready" \
            -H "Tags: white_check_mark" \
            -H "Click: $DOWNLOAD_URL" \
            -d "New Anki cards have been generated. Tap to download." \
            "https://ntfy.sh/${NTFY_TOPIC}"
