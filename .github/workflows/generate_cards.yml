name: Generate Anki Cards

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ffmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate Anki cards
        id: generate
        env:
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          NOTION_TOKEN:       ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: |
          python anki_generator_notion.py
          if ls output/*.apkg 1>/dev/null 2>&1; then
            echo "apkg_exists=true" >> $GITHUB_OUTPUT
          else
            echo "apkg_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload .apkg as artifact
        if: steps.generate.outputs.apkg_exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: anki-cards-${{ github.run_number }}
          path: output/*.apkg
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload to GitHub Releases and notify
        if: steps.generate.outputs.apkg_exists == 'true'
        env:
          GH_TOKEN:   ${{ secrets.GH_TOKEN }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          REPO:       ${{ github.repository }}
        run: |
          APKG_FILE=$(ls output/*.apkg | head -1)
          TAG="anki-latest"

          # 既存のリリースを削除して再作成（常に最新を上書き）
          gh release delete "$TAG" --yes 2>/dev/null || true

          # GitHub Release を作成して .apkg をアップロード
          gh release create "$TAG" "$APKG_FILE" \
            --title "Latest Anki Cards" \
            --notes "Auto-generated by GitHub Actions" \
            --repo "$REPO"

          # ダウンロードURLを生成（固定URL・認証不要）
          FILENAME=$(basename "$APKG_FILE")
          DOWNLOAD_URL="https://github.com/${REPO}/releases/download/${TAG}/anki_cards.apkg"

          # ファイル名を anki_cards.apkg に統一してリリース
          gh release delete "$TAG" --yes 2>/dev/null || true
          cp "$APKG_FILE" output/anki_cards.apkg
          gh release create "$TAG" "output/anki_cards.apkg" \
            --title "Latest Anki Cards" \
            --notes "Auto-generated by GitHub Actions" \
            --repo "$REPO"

          echo "Download URL: $DOWNLOAD_URL"

          # ntfy でURLを通知
          curl -s \
            -H "Title: Anki cards ready" \
            -H "Tags: white_check_mark" \
            -d "$DOWNLOAD_URL" \
            "https://ntfy.sh/${NTFY_TOPIC}"
