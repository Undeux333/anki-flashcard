name: Generate Anki Cards
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install ffmpeg
        run: sudo apt-get install -y ffmpeg
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Debug credentials
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: |
          echo "Length: ${#GOOGLE_CREDENTIALS}"
          echo "First 20 chars: ${GOOGLE_CREDENTIALS:0:20}"
      - name: Generate Anki cards
        id: generate
        env:
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          SPREADSHEET_ID:     ${{ secrets.SPREADSHEET_ID }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: |
          python anki_generator_notion.py
          if ls output/*.apkg 1>/dev/null 2>&1; then
            echo "apkg_exists=true" >> $GITHUB_OUTPUT
          else
            echo "apkg_exists=false" >> $GITHUB_OUTPUT
          fi
      - name: Upload .apkg as artifact
        if: steps.generate.outputs.apkg_exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: anki-cards-${{ github.run_number }}
          path: output/*.apkg
          if-no-files-found: ignore
          retention-days: 30
      - name: Upload to GitHub Releases and notify
        if: steps.generate.outputs.apkg_exists == 'true'
        env:
          GH_TOKEN:           ${{ secrets.GH_TOKEN }}
          NTFY_TOPIC:         ${{ secrets.NTFY_TOPIC }}
          SPREADSHEET_ID:     ${{ secrets.SPREADSHEET_ID }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          REPO:               ${{ github.repository }}
        run: |
          TIMESTAMP=$(date +"%Y%m%d%H%M")
          APKG_FILE=$(ls output/anki_cards_*.apkg | head -1)
          FILENAME=$(basename "$APKG_FILE")
          TAG="deck-${TIMESTAMP}"
          gh release create "$TAG" "$APKG_FILE" \
            --title "Anki Cards ${TIMESTAMP}" \
            --notes "Auto-generated" \
            --repo "$REPO"
          DOWNLOAD_URL="https://github.com/${REPO}/releases/download/${TAG}/${FILENAME}"
          echo "Download URL: $DOWNLOAD_URL"
          DOWNLOAD_URL="$DOWNLOAD_URL" python update_notion_release.py
          curl -s \
            -H "Title: Anki cards ready" \
            -H "Tags: white_check_mark" \
            -H "Click: $DOWNLOAD_URL" \
            -d "New Anki cards have been generated. Tap to download." \
            "https://ntfy.sh/${NTFY_TOPIC}"
